<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #faf9f7;
    --border: #ddd9d3;
    --text: #1a1a18;
    --text-muted: #888880;
    --accent: #2d5a3d;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 44px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-brand {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  .nav-links { display: flex; }

  .nav-links a {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    padding: 0 0.85rem;
    height: 44px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--text); border-bottom-color: var(--accent); }
  .nav-end { margin-left: auto; }

  .btn-ghost {
    font-size: 12px;
    padding: 3px 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: var(--sans);
  }

  main { padding: 0.75rem 0; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem 0.6rem;
  }

  .page-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .btn-add {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-add:hover { opacity: 0.85; }

  .status-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 1rem 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    min-height: 20px;
  }

  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: #8b3a2a; }
  .status-bar.ok { color: var(--accent); }

  .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .table-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead { background: var(--bg); }

  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 5px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th:not(:first-child) { text-align: right; }
  th.th-action { width: 60px; text-align: center !important; }

  td {
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 13px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f5f3ef; }

  td.name-cell { font-weight: 500; min-width: 130px; }
  td.num-cell {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
    color: var(--text);
  }
  td.zero {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
    color: var(--text-muted);
  }

  /* INLINE EDIT */
  td[contenteditable="true"] {
    outline: none;
    background: #fff !important;
    box-shadow: inset 0 0 0 1.5px var(--accent);
    border-radius: 3px;
    cursor: text;
  }

  .action-cell {
    text-align: center;
    white-space: nowrap;
  }

  .del-btn {
    font-size: 13px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 2px 4px;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }

  tr:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #8b3a2a; }

  .saving-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .new-row td { background: var(--accent-light, #e8f0eb) !important; }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">⬡ atelier</span>
  <div class="nav-links">
    <a href="index.html">Materials</a>
    <a href="products.html" class="active">Products</a>
    <a href="calculator.html">Calculator</a>
  </div>
  <div class="nav-end">
    <button class="btn-ghost" onclick="handleLogin()">sign in</button>
  </div>
</nav>

<main>
  <div class="toolbar">
    <span class="page-title">products</span>
    <button class="btn-add" onclick="addRow()">+ Add product</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="table-wrap">
    <table id="productsTable">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
const API = "https://materials-parser-api.onrender.com";
let HEADERS = [];
let saveTimer = null;
let pendingChanges = new Map(); // rowIndex -> rowData

function setStatus(msg, type = "") {
  const bar = document.getElementById("statusBar");
  bar.className = "status-bar" + (type ? " " + type : "");
  bar.innerHTML = type === "loading"
    ? `<span class="spinner"></span> ${msg}`
    : msg;
}

function clearStatus(delay = 0) {
  setTimeout(() => {
    document.getElementById("statusBar").innerHTML = "";
    document.getElementById("statusBar").className = "status-bar";
  }, delay);
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadProducts() {
  setStatus("Loading…", "loading");
  try {
    const res = await fetch(`${API}/products`);
    const data = await res.json();
    HEADERS = data.headers;
    renderTable(data.headers, data.products);
    clearStatus();
  } catch(e) {
    setStatus("Failed to load — API may be waking up, try again in 30s.", "error");
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTable(headers, products) {
  const thead = document.getElementById("thead");
  const tbody = document.getElementById("tbody");
  thead.innerHTML = "";
  tbody.innerHTML = "";

  const trHead = document.createElement("tr");
  headers.forEach((h, i) => {
    const th = document.createElement("th");
    th.textContent = h;
    if (i > 0) th.style.textAlign = "right";
    trHead.appendChild(th);
  });
  const thAct = document.createElement("th");
  thAct.className = "th-action";
  trHead.appendChild(thAct);
  thead.appendChild(trHead);

  if (!products || products.length === 0) return;

  products.forEach((product, rowIdx) => {
    tbody.appendChild(buildRow(product, rowIdx, headers));
  });
}

function buildRow(product, rowIdx, headers) {
  const tr = document.createElement("tr");
  tr.dataset.rowIdx = rowIdx;

  headers.forEach((h, colIdx) => {
    const td = document.createElement("td");
    const val = product[h] || "";

    if (colIdx === 0) {
      td.className = "name-cell";
    } else {
      const num = parseFloat(val);
      td.className = (!val || val === "0" || num === 0) ? "zero" : "num-cell";
    }

    td.textContent = val || (colIdx === 0 ? "" : "—");
    td.contentEditable = "true";

    td.addEventListener("focus", () => {
      if (td.textContent === "—") td.textContent = "";
    });

    td.addEventListener("blur", () => {
      const newVal = td.textContent.trim();
      if (!newVal && colIdx !== 0) td.textContent = "—";
      // Update class
      if (colIdx > 0) {
        const num = parseFloat(newVal);
        td.className = (!newVal || newVal === "0" || num === 0) ? "zero" : "num-cell";
      }
      scheduleAutoSave();
    });

    td.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); td.blur(); }
      if (e.key === "Tab") {
        e.preventDefault();
        const cells = [...tr.querySelectorAll("td[contenteditable]")];
        const idx = cells.indexOf(td);
        if (idx < cells.length - 1) cells[idx + 1].focus();
      }
    });

    tr.appendChild(td);
  });

  // Delete button
  const tdAct = document.createElement("td");
  tdAct.className = "action-cell";
  const delBtn = document.createElement("button");
  delBtn.className = "del-btn";
  delBtn.title = "Delete row";
  delBtn.textContent = "✕";
  delBtn.onclick = () => deleteRow(tr, rowIdx);
  tdAct.appendChild(delBtn);
  tr.appendChild(tdAct);

  return tr;
}

// ── AUTO SAVE ─────────────────────────────────────────────────────────────────
function scheduleAutoSave() {
  clearTimeout(saveTimer);
  setStatus(`<span class="saving-dot"></span> unsaved changes`);
  saveTimer = setTimeout(() => saveAll(), 1200);
}

async function saveAll() {
  setStatus("Saving…", "loading");

  const tbody = document.getElementById("tbody");
  const rows = [...tbody.querySelectorAll("tr")];

  const products = rows.map(tr => {
    const cells = [...tr.querySelectorAll("td[contenteditable]")];
    const obj = {};
    HEADERS.forEach((h, i) => {
      let val = cells[i]?.textContent.trim() || "";
      if (val === "—") val = "";
      obj[h] = val;
    });
    return obj;
  });

  try {
    const res = await fetch(`${API}/products`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ products })
    });
    if (!res.ok) throw new Error("Save failed");
    setStatus("✓ Saved", "ok");
    clearStatus(2000);
  } catch(e) {
    setStatus("Save failed — check connection", "error");
  }
}

// ── ADD ROW ───────────────────────────────────────────────────────────────────
function addRow() {
  const tbody = document.getElementById("tbody");
  const rowIdx = tbody.querySelectorAll("tr").length;
  const emptyProduct = {};
  HEADERS.forEach(h => emptyProduct[h] = "");
  const tr = buildRow(emptyProduct, rowIdx, HEADERS);
  tr.classList.add("new-row");
  tbody.appendChild(tr);
  tr.querySelector("td[contenteditable]")?.focus();
  scheduleAutoSave();
}

// ── DELETE ROW ────────────────────────────────────────────────────────────────
function deleteRow(tr, rowIdx) {
  if (!confirm("Delete this product?")) return;
  tr.remove();
  scheduleAutoSave();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function handleLogin() {
  alert("Google login coming soon");
}

loadProducts();
</script>
</body>
</html>
